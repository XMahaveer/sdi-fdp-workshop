<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0057B8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0B2E59">Setup A: BNC Loopback (Day 1 &amp; Day 3)</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#4A5568">Exercises 1.1, 1.2, 3.1, 3.2</text>

  <!-- Moku:Go Box -->
  <rect x="200" y="100" width="400" height="220" rx="12" fill="white" stroke="#0057B8" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="200" y="100" width="400" height="40" rx="12" fill="#0057B8"/>
  <rect x="200" y="128" width="400" height="12" fill="#0057B8"/>
  <text x="400" y="125" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Moku:Go</text>
  <text x="400" y="160" text-anchor="middle" font-size="11" fill="#4A5568">MOKU_IP from config.py</text>

  <!-- Output 1 -->
  <rect x="240" y="190" width="140" height="60" rx="8" fill="#EAF2FB" stroke="#0057B8" stroke-width="1.5"/>
  <text x="310" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B2E59">Output 1</text>
  <text x="310" y="235" text-anchor="middle" font-size="11" fill="#4A5568">BNC Connector</text>

  <!-- Input 1 -->
  <rect x="420" y="190" width="140" height="60" rx="8" fill="#F0FFF4" stroke="#276749" stroke-width="1.5"/>
  <text x="490" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749">Input 1</text>
  <text x="490" y="235" text-anchor="middle" font-size="11" fill="#4A5568">BNC Connector</text>

  <!-- Loopback Cable -->
  <path d="M 310 250 L 310 290 Q 310 310 330 310 L 470 310 Q 490 310 490 290 L 490 250" fill="none" stroke="#DD6B20" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="310" cy="250" r="5" fill="#DD6B20"/>
  <circle cx="490" cy="250" r="5" fill="#DD6B20"/>

  <!-- Cable Label -->
  <rect x="340" y="296" width="120" height="28" rx="4" fill="#FFFAF0" stroke="#DD6B20" stroke-width="1"/>
  <text x="400" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#DD6B20">BNC Cable</text>

  <!-- PC / Laptop -->
  <rect x="30" y="160" width="120" height="80" rx="8" fill="white" stroke="#553C9A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#553C9A">Laptop</text>
  <text x="90" y="215" text-anchor="middle" font-size="10" fill="#4A5568">Python + moku</text>

  <!-- WiFi connection -->
  <line x1="150" y1="200" x2="200" y2="200" stroke="#553C9A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="175" y="190" text-anchor="middle" font-size="9" fill="#553C9A">Wi-Fi / USB</text>

  <!-- Legend -->
  <rect x="30" y="340" width="740" height="45" rx="6" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="365" font-size="11" fill="#4A5568">
    <tspan font-weight="bold" fill="#DD6B20">━━ </tspan>BNC loopback cable  |
    <tspan font-weight="bold" fill="#553C9A"> ╌╌ </tspan>Network (Wi-Fi/USB)  |
    <tspan font-weight="bold" fill="#0057B8">■ </tspan>Output  |
    <tspan font-weight="bold" fill="#276749">■ </tspan>Input
  </text>
</svg>
