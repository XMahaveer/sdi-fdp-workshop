<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0057B8"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B35"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0B2E59">Day 3: Datalogger Streaming Setup</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#5A6B7B">Exercises 3.1, 3.2 and Capstone Option B</text>

  <!-- Moku:Go box -->
  <rect x="60" y="100" width="400" height="220" rx="12" fill="white" stroke="#0057B8" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="60" y="100" width="400" height="40" rx="12" fill="#0057B8"/>
  <rect x="60" y="128" width="400" height="12" fill="#0057B8"/>
  <text x="260" y="125" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Moku:Go — Datalogger</text>
  <text x="260" y="160" text-anchor="middle" font-size="11" fill="#5A6B7B">MOKU_IP from config.py</text>

  <!-- Output 1 -->
  <rect x="95" y="190" width="140" height="60" rx="8" fill="#EAF2FB" stroke="#0057B8" stroke-width="1.5"/>
  <text x="165" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B2E59">Output 1</text>
  <text x="165" y="235" text-anchor="middle" font-size="11" fill="#5A6B7B">built-in test signal</text>

  <!-- Input 1 -->
  <rect x="285" y="190" width="140" height="60" rx="8" fill="#FFF0E9" stroke="#FF6B35" stroke-width="1.5"/>
  <text x="355" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#B34A20">Input 1</text>
  <text x="355" y="235" text-anchor="middle" font-size="11" fill="#5A6B7B">streamed channel</text>

  <!-- BNC loopback -->
  <path d="M 165 250 C 165 300, 355 300, 355 250" fill="none" stroke="#FF6B35" stroke-width="3" marker-end="url(#arrowO)"/>
  <text x="260" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#B34A20">BNC loopback cable</text>

  <!-- Wi-Fi / Ethernet link -->
  <line x1="460" y1="210" x2="540" y2="210" stroke="#0057B8" stroke-width="2.5" stroke-dasharray="7,5" marker-end="url(#arrow)"/>
  <text x="500" y="195" text-anchor="middle" font-size="11" fill="#5A6B7B">Wi-Fi / USB-C</text>

  <!-- Laptop box -->
  <rect x="540" y="120" width="210" height="200" rx="12" fill="white" stroke="#0057B8" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="540" y="120" width="210" height="40" rx="12" fill="#0057B8"/>
  <rect x="540" y="148" width="210" height="12" fill="#0057B8"/>
  <text x="645" y="145" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Python (laptop)</text>
  <text x="645" y="185" text-anchor="middle" font-size="12" fill="#1A202C">start_streaming(</text>
  <text x="645" y="203" text-anchor="middle" font-size="12" fill="#1A202C">duration, sample_rate)</text>
  <text x="645" y="231" text-anchor="middle" font-size="12" fill="#1A202C">get_stream_data()</text>
  <text x="645" y="249" text-anchor="middle" font-size="12" fill="#1A202C">in a while-loop</text>
  <text x="645" y="277" text-anchor="middle" font-size="12" fill="#B34A20">'End of stream'</text>
  <text x="645" y="295" text-anchor="middle" font-size="12" fill="#B34A20">= normal completion</text>

  <!-- Data flow note -->
  <text x="400" y="370" text-anchor="middle" font-size="13" fill="#1A202C">Chunks arrive continuously → live statistics → CSV at the end</text>
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#5A6B7B">5-Day SDI Lab Automation FDP v2.0 — Spruha Build-in Solutions | Powered by Moku:Go — Liquid Instruments</text>
</svg>
